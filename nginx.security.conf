server {
  listen 443 ssl http2;
  server_name techcol.com www.techcol.com;

  root /usr/share/nginx/html;
  index index.html;

  # CSP deshabilitado en local para evitar bloqueos de scripts inline
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
